name: CodSpeed Slow Benchmarks

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  id-token: write

concurrency:
  group: codspeed-slow-pr-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  codspeed:
    name: Run full benchmarks from PR comment
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'dougmercer' &&
      github.event.comment.body == '/bench-slow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --group test --group dev

      - name: Show selected benchmark tier
        run: echo "Running full CodSpeed benchmarks from /bench-slow"

      - name: Run full benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: uv run pytest tests/test_benchmarks.py --codspeed --slow -o "addopts="
